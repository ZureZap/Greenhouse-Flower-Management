<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Nhà kính Trồng hoa</title>
    <!-- Thư viện Chart.js để vẽ biểu đồ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Các file CSS cho bố cục, thành phần và trang -->
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- Thanh điều hướng bên trái (sidebar) -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🌿</div>
            <div>
                <div class="sidebar-title">Nhà kính</div>
                <div class="sidebar-sub">Quản lý trồng hoa</div>
            </div>
        </div>
        <div class="sidebar-nav">
            <!-- Các mục menu, data-page chỉ định trang tương ứng -->
            <a class="nav-item active" data-page="dashboard" href="#">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a class="nav-item" data-page="devices" href="#">
                <span class="nav-icon">🔧</span> Thiết bị IoT
            </a>
            <a class="nav-item" data-page="zones" href="#">
                <span class="nav-icon">🗃️</span> Quản lý vùng
            </a>
            <a class="nav-item" data-page="growth" href="#">
                <span class="nav-icon">🌿</span> Chu kỳ sinh trưởng
            </a>
            <a class="nav-item" data-page="control" href="#">
                <span class="nav-icon">🎛️</span> Điều khiển
            </a>
            <a class="nav-item" data-page="alerts" href="#">
                <span class="nav-icon">🚨</span> Cảnh báo
            </a>
            <a class="nav-item" data-page="logs" href="#">
                <span class="nav-icon">📋</span> Nhật ký hệ thống
            </a>
        </div>
    </nav>

    <!-- Khu vực nội dung chính -->
    <main id="main">
        <!-- Các trang (page) – nội dung sẽ được JavaScript động điền vào -->
        <div class="page active" id="page-dashboard"></div>
        <div class="page" id="page-devices"></div>
        <div class="page" id="page-zones"></div>
        <div class="page" id="page-growth"></div>
        <div class="page" id="page-control"></div>
        <div class="page" id="page-alerts"></div>
        <div class="page" id="page-logs"></div>
    </main>

    <!-- Vùng chứa thông báo toast -->
    <div id="toast-container"></div>

    <!-- Ứng dụng JavaScript nhập từ file app.js (dạng module) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
